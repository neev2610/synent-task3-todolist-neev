<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Do It — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #1a1a2e;
      --paper:    #f7f5f0;
      --accent:   #5c6bc0;
      --accent-d: #3949ab;
      --done:     #b0bec5;
      --red:      #ef5350;
      --rule:     #e0ddd6;
      --shadow:   0 2px 16px rgba(26,26,46,.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 560px;
      margin-bottom: 36px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      line-height: 1.05;
      color: var(--ink);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 14px;
      color: #6b6b80;
    }

    /* ── Input area ── */
    .add-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 10px;
    }

    #task-input {
      flex: 1;
      padding: 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      border: 1.5px solid var(--rule);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }

    #task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(92,107,192,.15);
    }

    #task-input::placeholder { color: #b0b0be; }

    #add-btn {
      padding: 14px 22px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .18s, transform .1s;
      white-space: nowrap;
    }

    #add-btn:hover  { background: var(--accent-d); }
    #add-btn:active { transform: scale(.97); }

    /* ── Filter bar ── */
    .filters {
      display: flex;
      gap: 6px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 20px;
    }

    .filter-btn {
      padding: 6px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid var(--rule);
      border-radius: 20px;
      background: #fff;
      color: #6b6b80;
      cursor: pointer;
      transition: all .18s;
    }

    .filter-btn.active, .filter-btn:hover {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    /* ── Task list ── */
    #task-list {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: #fff;
      border: 1.5px solid var(--rule);
      border-radius: 12px;
      box-shadow: var(--shadow);
      transition: opacity .2s, transform .2s;
      animation: slideIn .22s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .task-item.done {
      opacity: .6;
    }

    /* custom checkbox */
    .check-wrap {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      position: relative;
      cursor: pointer;
    }

    .check-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 100%; height: 100%;
      cursor: pointer;
      margin: 0;
    }

    .check-box {
      width: 22px;
      height: 22px;
      border: 2px solid var(--rule);
      border-radius: 6px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .18s, border-color .18s;
    }

    .check-wrap input:checked ~ .check-box {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-box svg { display: none; }
    .check-wrap input:checked ~ .check-box svg { display: block; }

    .task-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.4;
      color: var(--ink);
      transition: color .2s;
      word-break: break-word;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done);
    }

    .del-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      color: #ccc;
      transition: color .18s, background .18s;
      display: flex;
      align-items: center;
    }

    .del-btn:hover {
      color: var(--red);
      background: #fdecea;
    }

    /* ── Empty state ── */
    #empty {
      width: 100%;
      max-width: 560px;
      text-align: center;
      padding: 56px 0 0;
      display: none;
    }

    #empty svg { opacity: .22; margin-bottom: 16px; }

    #empty p {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: #9090a0;
    }

    #empty small {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      color: #b0b0be;
    }

    /* ── Footer counter ── */
    .footer-bar {
      width: 100%;
      max-width: 560px;
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #a0a0b0;
    }

    #clear-done {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: #a0a0b0;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }

    #clear-done:hover { color: var(--red); }

    @media (prefers-reduced-motion: reduce) {
      .task-item { animation: none; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Task Manager</p>
  <h1>Things to <em>do.</em></h1>
  <p class="subtitle">Add tasks, check them off, stay on top of things.</p>
</header>

<div class="add-row">
  <input id="task-input" type="text" placeholder="What needs to be done?" maxlength="200" autocomplete="off" />
  <button id="add-btn">Add</button>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="done">Done</button>
</div>

<ul id="task-list"></ul>

<div id="empty">
  <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="8" width="44" height="48" rx="6" stroke="#1a1a2e" stroke-width="3"/>
    <line x1="20" y1="24" x2="44" y2="24" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="33" x2="44" y2="33" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="42" x2="34" y2="42" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <p>Nothing here yet.</p>
  <small>Add a task above to get started.</small>
</div>

<div class="footer-bar">
  <span id="task-count"></span>
  <button id="clear-done">Clear completed</button>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  let tasks  = JSON.parse(localStorage.getItem('doit-tasks') || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem('doit-tasks', JSON.stringify(tasks));
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    const list  = document.getElementById('task-list');
    const empty = document.getElementById('empty');
    const count = document.getElementById('task-count');

    const visible = tasks.filter(t =>
      filter === 'all'    ? true :
      filter === 'active' ? !t.done :
                             t.done
    );

    list.innerHTML = '';

    visible.forEach(task => {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' done' : '');
      li.dataset.id = task.id;
      li.innerHTML = `
        <label class="check-wrap" title="Mark complete">
          <input type="checkbox" ${task.done ? 'checked' : ''} aria-label="Complete task"/>
          <span class="check-box">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M1 5L4.5 8.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </label>
        <span class="task-text">${escHtml(task.text)}</span>
        <button class="del-btn" title="Delete task" aria-label="Delete task">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      `;

      li.querySelector('input[type="checkbox"]').addEventListener('change', () => toggleDone(task.id));
      li.querySelector('.del-btn').addEventListener('click', () => deleteTask(task.id));
      list.appendChild(li);
    });

    const allEmpty = tasks.length === 0 || (visible.length === 0);
    empty.style.display = allEmpty ? 'block' : 'none';

    const active = tasks.filter(t => !t.done).length;
    count.textContent = `${active} item${active !== 1 ? 's' : ''} left`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Actions ────────────────────────────────────────────
  function addTask(text) {
    text = text.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, done: false });
    save();
    render();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  // ── Events ─────────────────────────────────────────────
  document.getElementById('add-btn').addEventListener('click', () => {
    const inp = document.getElementById('task-input');
    addTask(inp.value);
    inp.value = '';
    inp.focus();
  });

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      addTask(e.target.value);
      e.target.value = '';
    }
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  document.getElementById('clear-done').addEventListener('click', () => {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  });

  // ── Init ───────────────────────────────────────────────
  render();
</script>
</body>
</html>
